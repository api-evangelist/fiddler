aid: fiddler
name: Fiddler
description: >-
  Fiddler by Telerik (Progress Software) is a suite of HTTP debugging proxy
  tools for capturing, inspecting, modifying, and replaying HTTP and HTTPS
  traffic between computers. The product family includes Fiddler Everywhere
  (cross-platform), Fiddler Classic (Windows), and Fiddler Jam (browser-based
  collaboration tool) for API debugging, performance testing, and web
  development workflows.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - HTTP Debugging
  - HTTP Proxy
  - Traffic Inspection
  - API Debugging
  - Performance Testing
  - Web Development
url: >-
  https://raw.githubusercontent.com/api-evangelist/fiddler/refs/heads/main/apis.yml
created: '2026-03-26'
modified: '2026-03-26'
specificationVersion: '0.19'
apis:
  - aid: fiddler:fiddler-everywhere
    name: Fiddler Everywhere
    description: >-
      Fiddler Everywhere is a cross-platform web debugging proxy for macOS,
      Windows, and Linux. It captures HTTP and HTTPS traffic, provides API
      composition capabilities, and includes collaboration features for team
      debugging and API testing workflows.
    humanURL: https://www.telerik.com/fiddler/fiddler-everywhere
    tags:
      - HTTP Debugging
      - Cross Platform
      - API Testing
      - Traffic Capture
    properties:
      - type: Documentation
        url: https://docs.telerik.com/fiddler-everywhere/introduction
      - type: GettingStarted
        url: https://docs.telerik.com/fiddler-everywhere/get-started/quickstart
      - type: Download
        url: https://www.telerik.com/download/fiddler-everywhere
  - aid: fiddler:fiddler-classic
    name: Fiddler Classic
    description: >-
      Fiddler Classic is the original free Windows-based HTTP debugging proxy
      for logging all HTTP and HTTPS traffic between a computer and the
      Internet. It supports traffic inspection, breakpoints, and extensibility
      through FiddlerScript and extensions.
    humanURL: https://www.telerik.com/fiddler/fiddler-classic
    tags:
      - HTTP Debugging
      - Windows
      - Free Tool
      - Traffic Logging
    properties:
      - type: Documentation
        url: https://docs.telerik.com/fiddler/configure-fiddler/tasks/configurefiddler
      - type: Download
        url: https://www.telerik.com/download/fiddler
  - aid: fiddler:fiddler-jam
    name: Fiddler Jam
    description: >-
      Fiddler Jam is a browser-based troubleshooting solution that enables
      non-technical users to capture HTTP traffic logs and share them with
      development teams for collaborative debugging of web issues and API
      problems.
    humanURL: https://www.telerik.com/fiddler/jam
    tags:
      - Browser Extension
      - Collaboration
      - Troubleshooting
      - Support
    properties:
      - type: Documentation
        url: https://docs.telerik.com/fiddler-jam/introduction
